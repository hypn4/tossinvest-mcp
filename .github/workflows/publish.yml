name: Publish

# v* 태그 push 시 빌드 후 PyPI 로 직접 배포.
# 버전은 git 태그에서 도출됨(hatch-vcs). 인증은 PyPI Trusted Publishing(OIDC).
on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # hatch-vcs 가 태그에서 버전을 읽으려면 전체 히스토리/태그 필요
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/tossinvest-mcp/
    permissions:
      id-token: write # PyPI Trusted Publishing(OIDC)용. 저장된 시크릿 불필요.
    steps:
      - uses: astral-sh/setup-uv@v8.1.0
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - run: uv publish --trusted-publishing always dist/*

  release:
    needs: pypi # PyPI 배포 성공 후에만 GitHub Release 생성
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release 페이지 생성 권한
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 이전 태그까지의 커밋 이력 필요
      # Conventional Commits 를 릴리스 노트로 변환(커스텀 설정 없이 내장 keepachangelog 프리셋)
      - uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          config: keepachangelog
          args: --latest --strip header
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.content }} # 커밋 기반 자동 노트
          files: dist/* # wheel·sdist 첨부
